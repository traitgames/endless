<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Endless — Self-Building World</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (function () {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        const host = location.hostname || "";
        const local =
          host === "localhost" ||
          host === "127.0.0.1" ||
          host === "0.0.0.0" ||
          host.endsWith(".local") ||
          /^10\\./.test(host) ||
          /^192\\.168\\./.test(host) ||
          /^172\\.(1[6-9]|2\\d|3[0-1])\\./.test(host) ||
          host === "";
        link.href = local ? `./styles.css?v=${Date.now()}` : "./styles.css";
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div id="hud" class="compact">
      <div id="status">
        <div class="badge">Endless</div>
        <div class="metrics">
          <div>Seed: <span id="seed">—</span></div>
          <div>Chunk: <span id="chunk">0,0</span></div>
          <div>Biome: <span id="biome">—</span></div>
          <div>FPS: <span id="fps">--</span></div>
          <div>Time: <span id="clock-time">--:-- --</span></div>
          <div>Backend: <span id="backend-mode">connecting</span></div>
          <div>State: <span id="state">ready</span></div>
        </div>
      </div>
      <div id="chat" class="minimized" aria-live="polite" aria-expanded="false">
        <div id="chat-header">
          <span class="chat-title">Create</span>
          <div class="panel-header-actions">
            <button id="chat-minimize" type="button" aria-label="Open create panel">Create</button>
            <button id="chat-clear" type="button">Clear</button>
          </div>
        </div>
        <div id="chat-body">
          <div id="chat-log"></div>
          <form id="chat-form" autocomplete="off">
            <input id="chat-input" type="text" placeholder="Describe the change you want..." />
            <div id="chat-actions">
              <button type="submit">Send</button>
              <button id="world-commands" type="button">Help</button>
              <button id="reset-save" type="button">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="action-trace" aria-live="polite">
      <div class="trace-header">
        <div class="trace-title">Action Trace</div>
        <div class="panel-header-actions trace-actions">
          <button id="trace-toggle" type="button" aria-controls="trace-log" aria-expanded="true">Hide</button>
          <button id="trace-clear" type="button">Clear</button>
        </div>
      </div>
      <div id="trace-log"></div>
    </div>
    <button
      id="action-trace-open"
      type="button"
      aria-controls="action-trace"
      aria-expanded="false"
      hidden
    >
      Action Trace
    </button>
    <div id="crosshair"></div>
    <div id="startup-loading" aria-live="polite" role="status">
      <div class="loading-card">
        <div id="startup-loading-title" class="loading-title">Loading...</div>
        <div id="startup-loading-subtitle" class="loading-subtitle">Building world terrain and biomes</div>
      </div>
    </div>
    <div id="help">
      <div>WASD: move · Space: jump · Mouse: look · Shift: sprint · R: reset position</div>
      <div>Enter: focus chat · Esc: toggle create/pause</div>
    </div>
    <canvas id="scene"></canvas>

    <script type="module" src="./main.js"></script>
  </body>
</html>
